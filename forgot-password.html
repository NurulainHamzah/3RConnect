<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signInUp.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300&display=swap" rel="stylesheet">
    <title>3RConnect | Forgot Password</title>
</head>
<body>
    <div class="body-container">
        <div class="container" id="container">
            <div>
                <div class="form-container forgot-password-container">
                    <form action="#" method="post">
                        <h1>Forgot Password</h1>
                        <p>Enter your email address below to reset your password.</p>
                        <input type="email" placeholder="Email" name="email" required />
                        <div class="btn-grad">Reset Password</div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="signInUp.js"></script>
</body>
</html>
