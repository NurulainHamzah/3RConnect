<!-- new_thread.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Create New Thread</title>
</head>
<body>
    <h1>Create New Thread</h1>
    
    <!-- Form to create a new thread -->
    <form>
        <label for="threadTitle">Thread Title:</label>
        <input type="text" id="threadTitle" name="threadTitle">

        <label for="threadContent">Thread Content:</label>
        <textarea id="threadContent" name="threadContent"></textarea>

        <button type="submit">Create Thread</button>
    </form>
</body>
</html>
